<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <title>Génie des Matériaux Mécaniques</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            overflow:hidden;

            background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
        }

        .background{

            position:absolute;

            width:100%;

            height:100%;

            overflow:hidden;
        }

        .circle{

            position:absolute;

            border-radius:50%;

            background:rgba(255,255,255,0.08);

            animation:move 10s infinite alternate;
        }

        .circle:nth-child(1){

            width:300px;
            height:300px;

            top:-100px;
            left:-100px;
        }

        .circle:nth-child(2){

            width:200px;
            height:200px;

            bottom:-50px;
            right:-50px;
        }

        .circle:nth-child(3){

            width:150px;
            height:150px;

            top:60%;
            left:10%;
        }

        .card{

            position:relative;

            width:550px;

            padding:45px;

            border-radius:30px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(15px);

            box-shadow:0 8px 32px rgba(0,0,0,0.35);

            text-align:center;

            animation:fade 1.5s ease;
        }

        .icon{

            font-size:65px;

            margin-bottom:20px;

            animation:float 3s infinite ease-in-out;
        }

        .prof{

            width:160px;

            height:160px;

            border-radius:50%;

            object-fit:cover;

            border:5px solid white;

            margin-bottom:25px;

            box-shadow:0 0 30px rgba(255,255,255,0.5);

            animation:zoom 3s infinite alternate;
        }

        h1{

            color:white;

            font-size:42px;

            margin-bottom:10px;

            text-shadow:0 0 10px rgba(255,255,255,0.3);
        }

        h2{

            color:#dfefff;

            font-size:24px;

            margin-bottom:25px;

            font-weight:normal;
        }

        p{

            color:white;

            font-size:18px;

            margin-bottom:35px;

            line-height:1.6;
        }

        a{

            text-decoration:none;
        }

        button{

            padding:16px 40px;

            border:none;

            border-radius:15px;

            background:white;

            color:#203a43;

            font-size:20px;

            font-weight:bold;

            cursor:pointer;

            transition:0.4s;
        }

        button:hover{

            transform:scale(1.12);

            background:#dfefff;

            box-shadow:0 0 20px rgba(255,255,255,0.5);
        }

        @keyframes fade{

            from{

                opacity:0;

                transform:translateY(50px);
            }

            to{

                opacity:1;

                transform:translateY(0);
            }
        }

        @keyframes float{

            0%{
                transform:translateY(0px);
            }

            50%{
                transform:translateY(-12px);
            }

            100%{
                transform:translateY(0px);
            }
        }

        @keyframes zoom{

            from{
                transform:scale(1);
            }

            to{
                transform:scale(1.05);
            }
        }

        @keyframes move{

            from{
                transform:translateY(0px);
            }

            to{
                transform:translateY(40px);
            }
        }

    </style>

</head>

<body>

    <div class="background">

        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>

    </div>

    <div class="card">

        <div class="icon">⚙️🔩🛠️</div>

        <img src="{{ url_for('static', filename='images/prof.jpg') }}" class="prof">

        <h1>Génie des Matériaux Mécaniques</h1>

        <h2>Master 2</h2>

        <p>
            Bienvenue dans le calculateur intelligent de moyenne du semestre 2.
            Calculez rapidement vos résultats universitaires avec une interface moderne et interactive.
        </p>

        <a href="/calcul">

            <button>
                Commencer
            </button>

        </a>

    </div>

</body>

</html>
